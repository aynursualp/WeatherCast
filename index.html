<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherCast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>WeatherCast</h1>
        <input type="text" id="enter-city" placeholder="Enter a city..">
        <button id="search-button">Show the weather</button>
        <div id="search-history" style="margin-top: 15px;"></div>
        <button id="clear-history" style="display: none; margin-top: 10px; font-size: 12px; color: #ff4d4d; border: none; background: none; cursor: pointer; text-decoration: underline;">
            Clear History
        </button>
        <div id="welcome-message">
            <h1 style="font-size: 50px; margin: 0;">🌤️</h1>
            <p>Type a city name to see the current weather.</p>
        </div>
        <div id="outcome">
            <h2 id="city-name">Adana</h2>
            <h1 id="temp">25°C</h1>
            <p id="description">Sunny</p>
            <div id="details">
                <p id="humid">Humid: 50%</p>
                <p id="wind">Wind: 15 km/h</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
